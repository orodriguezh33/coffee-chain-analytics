name: "coffee_chain"
version: "1.0.0"
config-version: 2

profile: "coffee_chain_athena"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  coffee_chain:
    staging:
      +materialized: view
      +schema: silver
    intermediate:
      +materialized: view
      +schema: silver
    marts:
      dimensions:
        +materialized: table
        +schema: gold
      facts:
        +materialized: table
        +schema: gold

seeds:
  coffee_chain:
    +schema: silver

vars:
  start_date: "2023-01-01"
  end_date: "2023-06-30"
