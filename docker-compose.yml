networks:
  coffee_chain_network:
    driver: bridge

volumes:
  dbt_target:
  airflow_logs:
  postgres_airflow_data:

x-aws-env: &aws-env
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  S3_BUCKET: ${S3_BUCKET}
  ATHENA_DATABASE: ${ATHENA_DATABASE}
  ATHENA_WORKGROUP: ${ATHENA_WORKGROUP}
  ATHENA_RESULTS: ${ATHENA_RESULTS}

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    <<: *aws-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD required}@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?AIRFLOW_FERNET_KEY required}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY required}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__LOGGING__LOGGING_LEVEL: 'INFO'
    AIRFLOW_VAR_S3_BUCKET: ${S3_BUCKET}
    AIRFLOW_VAR_ATHENA_DATABASE: ${ATHENA_DATABASE}
    AIRFLOW_VAR_ATHENA_RESULTS: ${ATHENA_RESULTS}
    AIRFLOW_VAR_AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    DBT_TARGET: dev
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/requirements.txt:/opt/airflow/requirements.txt
    - ./sql:/opt/airflow/sql
    - ./scripts:/opt/airflow/scripts
    - ./exports:/opt/airflow/exports
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./ingestion:/opt/airflow/ingestion
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy
  networks:
    - coffee_chain_network

services:
  ingestion:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    container_name: coffee_ingestion
    environment:
      <<: *aws-env
      PYTHONPATH: /app
    volumes:
      - ./ingestion:/app/ingestion
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./sql:/app/sql
    networks:
      - coffee_chain_network
    profiles: ["ingestion"]

  dbt:
    build:
      context: .
      dockerfile: docker/Dockerfile.dbt
    container_name: coffee_dbt
    environment:
      <<: *aws-env
      DBT_TARGET: ${DBT_TARGET:-dev}
      PYTHONPATH: /app
    volumes:
      - ./dbt:/app/dbt
      - dbt_target:/app/dbt/target
    networks:
      - coffee_chain_network
    profiles: ["dbt"]

  quality_gates:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    container_name: coffee_quality
    environment:
      <<: *aws-env
      PYTHONPATH: /app
    volumes:
      - ./scripts:/app/scripts
      - ./sql:/app/sql
    command: python /app/scripts/quality/run_quality_gates.py
    networks:
      - coffee_chain_network
    profiles: ["quality"]

  airflow-db:
    image: postgres:15
    container_name: coffee_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD required}
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - coffee_chain_network
    profiles: ["airflow"]

  airflow-init:
    <<: *airflow-common
    container_name: coffee_airflow_init
    command: >
      bash -c "
        pip install --no-cache-dir -r /opt/airflow/requirements.txt --quiet &&
        airflow db migrate &&
        airflow users create --username ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER required} --password ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD required} --firstname Coffee --lastname Chain --role Admin --email admin@coffeechain.com || true
      "
    profiles: ["airflow"]

  airflow-webserver:
    <<: *airflow-common
    container_name: coffee_airflow_web
    command: >
      bash -c "
        pip install --no-cache-dir -r /opt/airflow/requirements.txt --quiet &&
        airflow webserver
      "
    ports:
      - "8080:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
    profiles: ["airflow"]

  airflow-scheduler:
    <<: *airflow-common
    container_name: coffee_airflow_scheduler
    command: >
      bash -c "
        pip install --no-cache-dir -r /opt/airflow/requirements.txt --quiet &&
        airflow scheduler
      "
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    profiles: ["airflow"]
